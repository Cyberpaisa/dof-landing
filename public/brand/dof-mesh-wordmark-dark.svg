<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 80" width="340" height="80">
  <title>DOF-MESH — Wordmark Horizontal Dark</title>
  <desc>Horizontal lockup. Dark mode. © 2026 Juan Carlos Quiceno @Cyber_paisa</desc>
  <rect width="340" height="80" fill="#000000"/>
  <!-- Icon 60x60 centered at y=10 -->
  <g transform="translate(10,10) scale(0.6)">
    <polygon points="8,7 42,46 42,54 8,93 8,72 29,54 29,46 8,28" fill="#FFFFFF"/>
    <polygon points="92,7 58,46 58,54 92,93 92,72 71,54 71,46 92,28" fill="#FFFFFF"/>
