<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 130 142">

  <!-- Antena: palo fino + bola grande -->
  <rect x="59" y="6" width="10" height="22" rx="4.5" fill="#000"/>
  <circle cx="64" cy="8" r="11" fill="#000"/>

  <!-- Outer oval: rx=39 = casi semicírculo, parece oval horizontal -->
  <rect x="8" y="26" width="112" height="78" rx="39" fill="#000"/>

  <!-- Tail: triángulo abajo-izquierda, puntos calculados sobre la curva del oval -->
  <polygon points="30,103 18,128 53,104" fill="#000"/>

  <!-- White ring: el anillo blanco interior característico -->
  <rect x="16" y="34" width="96" height="62" rx="31" fill="#fff"/>

  <!-- Inner face pill: la cara/visor negra -->
  <rect x="24" y="42" width="80" height="46" rx="23" fill="#000"/>

  <!-- Ojos blancos -->
  <circle cx="47" cy="65" r="10" fill="#fff"/>
  <circle cx="81" cy="65" r="10" fill="#fff"/>

</svg>
