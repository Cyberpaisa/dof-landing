<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DOF Knowledge — Pipeline YouTube</title>
<meta name="description" content="Dashboard del Knowledge Pipeline DOF — videos de YouTube procesados con DOF score.">
<link rel="icon" type="image/png" sizes="32x32" href="/brand/dof-mesh-icon-cube-dark-32x32.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0b;
  --bg-panel: #131316;
  --bg-hover: #1c1c21;
  --border: #26262c;
  --text: #e8e8ea;
  --text-muted: #8b8b92;
  --accent: #22d3ee;
  --accent-dim: #0891b2;
  --success: #10b981;
  --warn: #f59e0b;
  --danger: #ef4444;
  --shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
  --radius: 12px;
  --font-sans: 'Plus Jakarta Sans', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 24px;
  font-size: 15px;
  line-height: 1.5;
}

.container { max-width: 1200px; margin: 0 auto; }

header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding-bottom: 24px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 32px;
  flex-wrap: wrap;
  gap: 16px;
}

.brand {
  display: flex;
  align-items: center;
  gap: 12px;
  font-weight: 800;
  font-size: 20px;
  letter-spacing: -0.02em;
}

.brand a { color: var(--text); text-decoration: none; }
.brand-tag { color: var(--accent); font-family: var(--font-mono); font-size: 13px; font-weight: 500; }

.mode-badge {
  padding: 4px 10px;
  border-radius: 999px;
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  background: var(--bg-panel);
  border: 1px solid var(--border);
}

.mode-badge.demo { color: var(--warn); border-color: var(--warn); }
.mode-badge.proxy { color: var(--success); border-color: var(--success); }
.mode-badge.error { color: var(--danger); border-color: var(--danger); }

.stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 12px;
  margin-bottom: 32px;
}

.stat {
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 20px;
}

.stat-label {
  color: var(--text-muted);
  font-size: 12px;
  font-family: var(--font-mono);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 4px;
}

.stat-value {
  font-size: 28px;
  font-weight: 800;
  letter-spacing: -0.03em;
}

h2 {
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 16px;
  color: var(--text-muted);
  font-family: var(--font-mono);
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

.reports { display: flex; flex-direction: column; gap: 16px; }

.report {
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  transition: border-color 0.15s, background 0.15s;
}

.report:hover { border-color: var(--accent-dim); background: var(--bg-hover); }

.report-head {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 16px;
  margin-bottom: 12px;
}

.report-title {
  font-size: 16px;
  font-weight: 700;
  line-height: 1.3;
  letter-spacing: -0.01em;
}

.report-title a { color: var(--text); text-decoration: none; }
.report-title a:hover { color: var(--accent); }

.report-channel {
  color: var(--text-muted);
  font-size: 13px;
  margin-top: 4px;
}

.dof-score {
  flex-shrink: 0;
  font-family: var(--font-mono);
  font-size: 24px;
  font-weight: 700;
  color: var(--accent);
  padding: 8px 12px;
  background: rgba(34, 211, 238, 0.08);
  border-radius: 8px;
  min-width: 70px;
  text-align: center;
}

.dof-score.low { color: var(--warn); background: rgba(245, 158, 11, 0.08); }
.dof-score.high { color: var(--success); background: rgba(16, 185, 129, 0.08); }

.meta {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
  color: var(--text-muted);
  font-size: 13px;
  margin-bottom: 12px;
  font-family: var(--font-mono);
}

.ideas { margin-bottom: 12px; }

.ideas ul {
  list-style: none;
  padding-left: 0;
}

.ideas li {
  padding: 4px 0 4px 18px;
  position: relative;
  color: var(--text);
  font-size: 14px;
}

.ideas li::before {
  content: '▸';
  position: absolute;
  left: 0;
  color: var(--accent);
}

.tags {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 12px;
}

.tag {
  font-family: var(--font-mono);
  font-size: 11px;
  padding: 2px 8px;
  background: var(--bg-hover);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text-muted);
}

.actions {
  display: flex;
  gap: 8px;
  justify-content: flex-end;
  padding-top: 12px;
  border-top: 1px solid var(--border);
}

.btn {
  padding: 8px 16px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text);
  font-family: var(--font-sans);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
}

.btn:hover { background: var(--bg-hover); }
.btn-approve { border-color: var(--success); color: var(--success); }
.btn-approve:hover { background: var(--success); color: var(--bg); }
.btn-reject { border-color: var(--danger); color: var(--danger); }
.btn-reject:hover { background: var(--danger); color: var(--bg); }

.status {
  padding: 2px 8px;
  border-radius: 4px;
  font-family: var(--font-mono);
  font-size: 11px;
  text-transform: uppercase;
}

.status-pending { background: rgba(245, 158, 11, 0.15); color: var(--warn); }
.status-approved { background: rgba(16, 185, 129, 0.15); color: var(--success); }
.status-rejected { background: rgba(239, 68, 68, 0.15); color: var(--danger); }

.empty {
  text-align: center;
  padding: 64px 24px;
  color: var(--text-muted);
  background: var(--bg-panel);
  border-radius: var(--radius);
  border: 1px dashed var(--border);
}

footer {
  margin-top: 48px;
  padding-top: 24px;
  border-top: 1px solid var(--border);
  color: var(--text-muted);
  font-size: 13px;
  text-align: center;
  font-family: var(--font-mono);
}

footer a { color: var(--accent); text-decoration: none; }

@media (max-width: 640px) {
  body { padding: 16px; }
  .report-head { flex-direction: column-reverse; }
  .dof-score { align-self: flex-start; }
}
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="brand">
      <a href="/">◼ DOF-MESH</a>
      <span class="brand-tag">/ knowledge</span>
    </div>
    <span id="mode-badge" class="mode-badge">loading</span>
  </header>

  <section class="stats" id="stats"></section>

  <h2>Reportes procesados</h2>
  <section class="reports" id="reports"></section>

  <footer>
    Knowledge Pipeline DOF — procesa videos de YouTube localmente con Ollama.
    Verifica reporte → aprueba → encola en commander.
    <br>
    <a href="/">← Volver a dofmesh.com</a>
  </footer>
</div>

<script>
const API = '/api/knowledge';

function scoreClass(score) {
  if (score >= 85) return 'dof-score high';
  if (score >= 60) return 'dof-score';
  return 'dof-score low';
}

function renderStats(stats) {
  const el = document.getElementById('stats');
  if (!stats) { el.innerHTML = ''; return; }
  const items = [
    { label: 'Total procesados', value: stats.total_processed ?? '—' },
    { label: 'Pendientes', value: stats.pending ?? '—' },
    { label: 'Aprobados', value: stats.approved ?? '—' },
    { label: 'Rechazados', value: stats.rejected ?? '—' },
    { label: 'DOF score promedio', value: stats.avg_dof_score ? stats.avg_dof_score.toFixed(1) : '—' }
  ];
  el.innerHTML = items.map(i => `
    <div class="stat">
      <div class="stat-label">${i.label}</div>
      <div class="stat-value">${i.value}</div>
    </div>
  `).join('');
}

function renderReports(reports) {
  const el = document.getElementById('reports');
  if (!reports || reports.length === 0) {
    el.innerHTML = '<div class="empty">No hay reportes para mostrar. El Knowledge Pipeline está en reposo.</div>';
    return;
  }
  el.innerHTML = reports.map(r => `
    <article class="report" data-id="${r.id}">
      <div class="report-head">
        <div>
          <div class="report-title">
            ${r.source_url ? `<a href="${r.source_url}" target="_blank" rel="noopener">${escapeHtml(r.title || 'Sin título')}</a>` : escapeHtml(r.title || 'Sin título')}
          </div>
          <div class="report-channel">${escapeHtml(r.channel || '')} ${r.status ? `<span class="status status-${r.status}">${r.status}</span>` : ''}</div>
        </div>
        <div class="${scoreClass(r.dof_score || 0)}">${r.dof_score ?? '?'}</div>
      </div>
      <div class="meta">
        ${r.relevance !== undefined ? `<span>relevance: ${(r.relevance*100).toFixed(0)}%</span>` : ''}
        ${r.processed_at ? `<span>${new Date(r.processed_at).toLocaleString('es-CO')}</span>` : ''}
      </div>
      ${r.key_ideas && r.key_ideas.length ? `
        <div class="ideas">
          <ul>${r.key_ideas.map(i => `<li>${escapeHtml(i)}</li>`).join('')}</ul>
        </div>
      ` : ''}
      ${r.technologies && r.technologies.length ? `
        <div class="tags">${r.technologies.map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('')}</div>
      ` : ''}
      ${r.status === 'pending' ? `
        <div class="actions">
          <button class="btn btn-reject" data-action="reject" data-id="${r.id}">Rechazar</button>
          <button class="btn btn-approve" data-action="approve" data-id="${r.id}">Aprobar</button>
        </div>
      ` : ''}
    </article>
  `).join('');
}

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function setMode(mode) {
  const badge = document.getElementById('mode-badge');
  badge.className = `mode-badge ${mode}`;
  const labels = { demo: 'demo mode', proxy: 'live', error: 'offline' };
  badge.textContent = labels[mode] || mode;
}

async function load() {
  try {
    const res = await fetch(API + '?path=pending');
    const data = await res.json();
    setMode(data.mode || 'proxy');
    renderStats(data.stats || data);
    renderReports(data.reports || data.pending || []);
  } catch (err) {
    setMode('error');
    document.getElementById('reports').innerHTML =
      `<div class="empty">No se pudo conectar con el Knowledge API.<br><code>${escapeHtml(err.message)}</code></div>`;
  }
}

document.addEventListener('click', async (e) => {
  const btn = e.target.closest('button[data-action]');
  if (!btn) return;
  const action = btn.dataset.action;
  const id = btn.dataset.id;
  btn.disabled = true;
  btn.textContent = '...';
  try {
    const res = await fetch(`${API}?path=${action}/${encodeURIComponent(id)}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id })
    });
    const data = await res.json();
    if (data.ok || data.mode === 'demo') {
      await load();
    } else {
      btn.textContent = 'Error';
    }
  } catch {
    btn.textContent = 'Error';
  }
});

load();
setInterval(load, 30000);
</script>
</body>
</html>
